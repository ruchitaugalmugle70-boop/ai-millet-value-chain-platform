name: frontend
description: AI Powered Crop Intelligence System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # Fonts
  google_fonts: ^6.1.0

  # Animations
  flutter_animate: ^4.5.0
  animated_card: ^2.0.0
  lottie: ^2.7.0

  # Charts
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3

  # ✅ Image Picker (Correct Place)
  image_picker: ^1.0.4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
